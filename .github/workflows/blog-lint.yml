name: Blog Format Linter

on:
  push:
    paths:
      - '_posts/**.md'
      - '_data/language_links.json'
      - '_includes/language-switcher.html'
      - '_layouts/single.html'
      - 'images/**'
      - 'scripts/generate_language_links.py'
      - 'scripts/generate_author_notes.py'
      - 'scripts/lint_blog_format.py'
      - 'tests/**.py'
      - 'tests/fixtures/**'
      - '.github/workflows/blog-lint.yml'
  pull_request:
    paths:
      - '_posts/**.md'
      - '_data/language_links.json'
      - '_includes/language-switcher.html'
      - '_layouts/single.html'
      - 'images/**'
      - 'scripts/generate_language_links.py'
      - 'scripts/generate_author_notes.py'
      - 'scripts/lint_blog_format.py'
      - 'tests/**.py'
      - 'tests/fixtures/**'
      - '.github/workflows/blog-lint.yml'
  workflow_dispatch: # Allow manual runs

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Blog Linter
        run: python3 scripts/lint_blog_format.py

      - name: Check Generated Author Notes
        run: python3 scripts/generate_author_notes.py --check

      - name: Check Generated Language Links
        run: python3 scripts/generate_language_links.py --check

      - name: Run Blog Tests
        run: python3 -m unittest discover -s tests -v
