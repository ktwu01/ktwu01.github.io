name: Blog Format Linter

on:
  push:
    paths:
      - '_posts/**.md'
      - 'scripts/lint_blog_format.py'
      - 'tests/test_blog_lint.py'
      - 'tests/fixtures/**'
      - '.github/workflows/blog-lint.yml'
  pull_request:
    paths:
      - '_posts/**.md'
      - 'scripts/lint_blog_format.py'
      - 'tests/test_blog_lint.py'
      - 'tests/fixtures/**'
      - '.github/workflows/blog-lint.yml'
  workflow_dispatch: # Allow manual runs

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Blog Linter
        run: python3 scripts/lint_blog_format.py

      - name: Run Blog Linter Tests
        run: python3 -m unittest tests/test_blog_lint.py -v
