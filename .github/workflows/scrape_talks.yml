name: Scrape Talk Locations

on:
  push:
    paths:
      - '_talks/**'
      - 'talkmap.ipynb'
      - '.github/workflows/scrape_talks.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install jupyter pandas requests beautifulsoup4 geopy  # Add other dependencies as needed
        pip install getorg --upgrade

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap_out.ipynb talkmap/
        if git diff --cached --quiet; then
          echo "No talk-map changes to commit"
          exit 0
        fi
        git commit -m "Automated update of talk locations"
        git push
