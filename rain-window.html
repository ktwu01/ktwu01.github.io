<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>雨窗 · Rain on Glass</title>
  <meta name="description" content="雨天玻璃窗上雨滴滑落的实时渲染效果 — WebGL rain-on-glass demo by Koutian Wu" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #05070c;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
        -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e8edf5;
    }

    #glass {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    .ui {
      position: fixed;
      z-index: 2;
      transition: opacity 1.2s ease;
    }

    .ui.dim { opacity: 0.15; }
    .ui:hover { opacity: 1; }

    .title {
      top: 22px;
      left: 24px;
      padding: 12px 18px;
      border-radius: 14px;
      background: rgba(10, 16, 28, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .title h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .title h1 span {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #9fb0c8;
      margin-left: 8px;
    }

    .title a {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.72rem;
      color: #8fa3c0;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .title a:hover { color: #cdd9ea; }

    .controls {
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(10, 16, 28, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b9c6da;
    }

    .controls input[type="range"] {
      width: 130px;
      accent-color: #7fa8d9;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: #dbe4f0;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .controls button:hover { background: rgba(255, 255, 255, 0.14); }
    .controls button.on {
      background: rgba(127, 168, 217, 0.35);
      border-color: rgba(127, 168, 217, 0.6);
    }

    /* ---- CSS fallback when WebGL is unavailable ---- */
    .fallback {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0a1220 0%, #131c2e 55%, #1a2233 100%);
    }

    body.no-webgl .fallback { display: block; }
    body.no-webgl #glass { display: none; }

    .fallback::before,
    .fallback::after {
      content: "";
      position: absolute;
      inset: -100% 0 0 0;
      background-image: repeating-linear-gradient(
        12deg,
        transparent 0px,
        transparent 42px,
        rgba(180, 205, 235, 0.10) 43px,
        rgba(180, 205, 235, 0.22) 45px,
        transparent 46px,
        transparent 96px
      );
      animation: fall 1.1s linear infinite;
    }

    .fallback::after {
      background-image: repeating-linear-gradient(
        10deg,
        transparent 0px,
        transparent 27px,
        rgba(160, 190, 225, 0.08) 28px,
        rgba(160, 190, 225, 0.16) 29px,
        transparent 30px,
        transparent 61px
      );
      animation-duration: 0.7s;
    }

    @keyframes fall {
      to { transform: translateY(50%); }
    }

    .fallback p {
      position: absolute;
      bottom: 70px;
      width: 100%;
      text-align: center;
      color: #8fa3c0;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <canvas id="glass"></canvas>

  <div class="fallback">
    <p>当前浏览器不支持 WebGL，已切换到简化版雨幕效果。</p>
  </div>

  <div class="ui title">
    <h1>雨窗<span>Rain on Glass</span></h1>
    <a href="/">← koutian.is-a.dev</a>
  </div>

  <div class="ui controls">
    <label>雨量
      <input id="rain" type="range" min="0" max="100" value="60" />
    </label>
    <button id="sound" type="button">🔇 雨声</button>
    <button id="pause" type="button">⏸ 暂停</button>
  </div>

  <script id="frag" type="x-shader/x-fragment">
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

uniform vec2  u_res;
uniform float u_time;
uniform float u_rain;   // 0..1 rain amount
uniform vec2  u_mouse;  // -0.5..0.5 parallax

#define S(a, b, x) smoothstep(a, b, x)

float hash1(float n) { return fract(sin(n) * 43758.5453123); }
float hash2(vec2 p)  { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
vec2  hash22(vec2 p) {
  return fract(sin(vec2(dot(p, vec2(127.1, 311.7)),
                        dot(p, vec2(269.5, 183.3)))) * 43758.5453123);
}

// ------------------------------------------------------------------
// Background: a rainy-night city seen out of focus through the pane.
// `blur` = 0 sharp (inside a droplet lens) .. ~1.2 heavy defocus.
// ------------------------------------------------------------------
vec3 bgcol(vec2 uv, float blur) {
  // night sky gradient + warm city glow near the bottom
  vec3 col = mix(vec3(0.016, 0.026, 0.055), vec3(0.075, 0.095, 0.16), S(-0.55, 0.65, uv.y));
  col += vec3(0.22, 0.12, 0.05) * S(0.35, -0.45, uv.y) * 0.55;

  // three layers of bokeh city lights
  for (int i = 0; i < 3; i++) {
    float fi = float(i);
    float sc = 3.5 + fi * 2.6;
    vec2 gv = uv * sc + vec2(fi * 13.7 + 3.1, fi * 7.3);
    vec2 id = floor(gv);
    vec2 f  = fract(gv) - 0.5;
    vec2 rnd = hash22(id);
    // keep blurred circles inside their cell so no square clipping shows
    vec2 c = (rnd - 0.5) * 0.4;

    // lights get denser toward the lower part of the view
    // (use the cell's own y so a light never gets cut by the density ramp)
    float cellY = (id.y + 0.5 - fi * 7.3) / sc;
    float prob = mix(0.5, 0.08, S(-0.35, 0.55, cellY));
    float presence = step(hash2(id + fi * 5.0), prob);

    float r = mix(0.04, 0.11, hash2(id + 3.1));
    float b = clamp(blur, 0.0, 1.3);
    float rad = r * (1.0 + b * 1.2);
    float d = length(f - c);
    float m = S(rad, rad - mix(0.012, rad * 0.9, min(b, 1.0)), d);
    m *= presence / (1.0 + b * 2.2);

    float hc = hash2(id + 5.5);
    vec3 lc = hc < 0.42 ? vec3(1.0, 0.62, 0.24)        // sodium / warm windows
            : hc < 0.72 ? vec3(0.92, 0.86, 0.70)       // white
            : hc < 0.88 ? vec3(0.38, 0.66, 1.0)        // cool signage
                        : vec3(1.0, 0.32, 0.34);       // red
    col += lc * m * mix(1.25, 0.65, fi / 2.0);
  }
  return col;
}

// ------------------------------------------------------------------
// Static condensation droplets that slowly appear and evaporate.
// ------------------------------------------------------------------
float statics(vec2 uv, float t) {
  vec2 gv = uv * 24.0;
  vec2 id = floor(gv);
  vec2 f  = fract(gv) - 0.5;
  vec2 rnd = hash22(id);

  float ph = fract(t * 0.03 + rnd.x * 7.0);
  float life = S(0.0, 0.06, ph) * (1.0 - S(0.5, 1.0, ph));

  vec2 c = (rnd - 0.5) * 0.5;
  float r = mix(0.08, 0.2, hash2(id + 7.7)) * life;
  return S(r, r * 0.4, length(f - c)) * step(hash2(id + 3.3), 0.42);
}

// ------------------------------------------------------------------
// One layer of drops sliding down in loose columns. Each column
// spawns a drop on its own clock; the drop wanders sideways as it
// falls, leaves a thinning wet trail and a string of leftover beads.
// Returns vec2(droplet mask, wet-trail mask).
// ------------------------------------------------------------------
vec2 slide(vec2 uv, float t, float seed, float amount, float sz) {
  float cols = 10.0;
  float x = uv.x * cols;
  float ci = floor(x);
  float lx = fract(x) - 0.5;                     // local x in cell units
  float rc = hash1(ci * 17.31 + seed * 101.7);   // per-column random

  float period = mix(15.0, 4.5, amount) * (0.6 + 0.8 * rc);
  float tt = (t + rc * 61.0) / period;
  float cyc = floor(tt);
  float ph = fract(tt);                          // 0..1 progress of this drop
  float rd = hash1(ci * 7.13 + cyc * 31.7 + seed * 13.7);
  float exist = step(hash1(ci * 3.3 + cyc * 17.0 + seed * 7.1), mix(0.12, 0.8, amount));

  // stick-slip descent: the drop crosses the pane in the first ~half of the
  // cycle, then the column just stays wet and dries until the next drop
  float fall = S(0.0, 0.5, ph) + 0.05 * sin(ph * 45.0 + rd * 6.28) * (1.0 - ph);
  float dy = 1.08 - fall * 1.3;

  // wandering path as a function of height (so the trail follows it)
  float bx = (rd - 0.5) * 0.5;
  float k1 = 12.0 + rd * 6.0;
  float amp = 0.35 * (0.5 - abs(bx));
  float pathHere = bx + (sin(uv.y * k1 + rd * 6.28) * 0.5 + sin(uv.y * 31.0 + rd * 3.0) * 0.3) * amp;
  float pxd      = bx + (sin(dy   * k1 + rd * 6.28) * 0.5 + sin(dy   * 31.0 + rd * 3.0) * 0.3) * amp;

  // main drop, slightly elongated vertically
  float rr = mix(0.006, 0.012, hash1(ci * 5.7 + cyc * 11.3 + seed)) * sz;
  vec2 dv = vec2((lx - pxd) / cols, (uv.y - dy) * 0.72);
  float drop = S(rr, rr * 0.45, length(dv)) * exist;

  // wet trail above the drop, thinning and drying with distance behind
  float behind = uv.y - dy;
  float cd = abs(lx - pathHere) / cols;
  float w = rr * (0.45 + 0.4 * S(1.3, 0.0, behind));
  float trail = S(w, w * 0.35, cd) * step(0.0, behind) * exist;
  trail *= mix(1.0, 0.25, S(0.0, 1.1, behind));
  trail *= 1.0 - S(0.8, 1.0, ph) * 0.6;

  // beads left along the trail
  float bn = 50.0;
  float byi = floor(uv.y * bn);
  float bh = hash1(byi * 3.71 + ci * 13.7 + cyc * 7.7 + seed * 3.0);
  float by = (byi + 0.3 + 0.4 * bh) / bn;
  float bpx = bx + (sin(by * k1 + rd * 6.28) * 0.5 + sin(by * 31.0 + rd * 3.0) * 0.3) * amp;
  float br = rr * (0.25 + 0.5 * hash1(byi * 7.1 + ci * 3.3 + cyc));
  vec2 bv = vec2((lx - bpx) / cols, uv.y - by);
  float bead = S(br, br * 0.35, length(bv));
  bead *= step(0.55, bh) * step(dy, by) * exist * (1.0 - S(0.85, 1.0, ph));

  return vec2(drop + bead * 0.9, trail);
}

// combined droplet field: statics + two sliding layers
vec2 dropsC(vec2 uv, float t, float amt) {
  float s = statics(uv, t) * (0.55 + 0.45 * amt);
  vec2 a = slide(uv, t, 1.0, amt, 1.0);
  vec2 b = slide(vec2(uv.x * 1.7 + 0.31, uv.y), t * 1.13 + 40.0, 7.7, amt * 0.85, 0.75);
  return vec2(s * 0.7 + a.x + b.x, a.y + b.y * 0.8);
}

// scalar version used for the numerical normal
float dropsV(vec2 uv, float t, float amt) {
  vec2 r = dropsC(uv, t, amt);
  return r.x + 0.2 * r.y;
}

void main() {
  vec2 frag = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  vec2 uv  = vec2(frag.x * aspect, frag.y);          // droplet space
  vec2 buv = (frag - 0.5) * vec2(aspect, 1.0);       // background space
  float t = u_time;
  float amt = clamp(u_rain, 0.0, 1.0);

  vec2 c = dropsC(uv, t, amt);
  float comb = c.x + 0.2 * c.y;
  float e = 0.0012;
  vec2 n = vec2(dropsV(uv + vec2(e, 0.0), t, amt) - comb,
                dropsV(uv + vec2(0.0, e), t, amt) - comb);

  // glass focus: blurry pane, slightly clearer where wet, sharp inside drops
  float blur = mix(1.15, 0.7, S(0.0, 0.6, c.y));
  blur = mix(blur, 0.02, S(0.05, 0.4, c.x));

  vec3 col = bgcol(buv + n * 1.9 + u_mouse * 0.035, blur);

  // condensation haze on the dry parts of the glass
  float fog = (1.0 - S(0.0, 0.5, c.y)) * (1.0 - S(0.05, 0.3, c.x));
  col = mix(col, vec3(0.36, 0.44, 0.55), fog * 0.11);

  // little glints on droplet rims
  col += vec3(0.7, 0.8, 0.95) * pow(clamp(length(n) * 3.0, 0.0, 1.0), 3.0) * 0.22;

  // occasional distant lightning (only in heavier rain)
  float fl = pow(max(0.0, sin(t * 0.41) * sin(t * 0.53) * sin(t * 0.73)), 24.0);
  col *= 1.0 + fl * S(0.4, 1.0, amt) * 1.6 * S(-0.6, 0.5, buv.y + 0.4);

  // vignette + gamma
  col *= 1.0 - 0.32 * dot(buv, buv);
  col = pow(clamp(col, 0.0, 1.0), vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}
  </script>

  <script>
    (function () {
      var canvas = document.getElementById('glass');
      var gl = canvas.getContext('webgl', { antialias: false }) ||
               canvas.getContext('experimental-webgl', { antialias: false });

      if (!gl) { document.body.classList.add('no-webgl'); return; }

      var VERT = 'attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }';

      function compile(type, src) {
        var s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(s));
          return null;
        }
        return s;
      }

      var vs = compile(gl.VERTEX_SHADER, VERT);
      var fs = compile(gl.FRAGMENT_SHADER, document.getElementById('frag').textContent);
      if (!vs || !fs) { document.body.classList.add('no-webgl'); return; }

      var prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(prog));
        document.body.classList.add('no-webgl');
        return;
      }
      gl.useProgram(prog);

      var buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
      var loc = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

      var uRes = gl.getUniformLocation(prog, 'u_res');
      var uTime = gl.getUniformLocation(prog, 'u_time');
      var uRain = gl.getUniformLocation(prog, 'u_rain');
      var uMouse = gl.getUniformLocation(prog, 'u_mouse');

      function resize() {
        var dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        var w = Math.floor(canvas.clientWidth * dpr);
        var h = Math.floor(canvas.clientHeight * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
          gl.viewport(0, 0, w, h);
        }
      }
      window.addEventListener('resize', resize);

      // ---- state ----
      var rain = 0.6;
      var paused = false;
      var mx = 0, my = 0, tmx = 0, tmy = 0;
      var start = performance.now();
      var pausedAt = 0;

      var slider = document.getElementById('rain');
      slider.addEventListener('input', function () {
        rain = slider.value / 100;
        if (audio) audio.gain.gain.value = gainFor(rain);
      });

      var pauseBtn = document.getElementById('pause');
      pauseBtn.addEventListener('click', function () {
        paused = !paused;
        if (paused) { pausedAt = performance.now(); }
        else { start += performance.now() - pausedAt; requestAnimationFrame(frame); }
        pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
      });

      window.addEventListener('pointermove', function (ev) {
        tmx = ev.clientX / window.innerWidth - 0.5;
        tmy = 0.5 - ev.clientY / window.innerHeight;
      });

      // ---- rain sound: looped filtered noise, no assets needed ----
      var audio = null;
      function gainFor(r) { return 0.05 + 0.3 * r; }
      var soundBtn = document.getElementById('sound');
      soundBtn.addEventListener('click', function () {
        if (!audio) {
          try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var len = ctx.sampleRate * 2;
            var buffer = ctx.createBuffer(1, len, ctx.sampleRate);
            var data = buffer.getChannelData(0);
            var last = 0;
            for (var i = 0; i < len; i++) {
              // brown-ish noise reads as steady rainfall
              last = (last + (Math.random() * 2 - 1) * 0.04) * 0.985;
              data[i] = last * 3.0;
            }
            var src = ctx.createBufferSource();
            src.buffer = buffer;
            src.loop = true;
            var lp = ctx.createBiquadFilter();
            lp.type = 'lowpass';
            lp.frequency.value = 900;
            var gain = ctx.createGain();
            gain.gain.value = gainFor(rain);
            src.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
            src.start();
            audio = { ctx: ctx, gain: gain, on: true };
          } catch (e) { return; }
        } else {
          audio.on = !audio.on;
          audio.gain.gain.value = audio.on ? gainFor(rain) : 0;
        }
        soundBtn.textContent = audio.on ? '🔊 雨声' : '🔇 雨声';
        soundBtn.classList.toggle('on', audio.on);
      });

      // dim the UI after a few idle seconds
      var idleTimer = null;
      function poke() {
        document.querySelectorAll('.ui').forEach(function (el) { el.classList.remove('dim'); });
        clearTimeout(idleTimer);
        idleTimer = setTimeout(function () {
          document.querySelectorAll('.ui').forEach(function (el) { el.classList.add('dim'); });
        }, 3500);
      }
      window.addEventListener('pointermove', poke);
      window.addEventListener('pointerdown', poke);
      poke();

      document.addEventListener('visibilitychange', function () {
        if (document.hidden && !paused) { pauseBtn.click(); }
      });

      function frame(now) {
        if (paused) return;
        resize();
        mx += (tmx - mx) * 0.04;
        my += (tmy - my) * 0.04;
        // wrap time to keep float precision happy on long sessions
        var t = ((now - start) / 1000) % 3600;
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.uniform1f(uTime, t);
        gl.uniform1f(uRain, rain);
        gl.uniform2f(uMouse, mx, my);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        requestAnimationFrame(frame);
      }
      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>

</html>
